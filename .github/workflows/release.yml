name: Build release artifacts

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  foundation:
    name: Foundation gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node 22.22.2
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0
      - name: Install cargo-deny 0.20.2
        run: cargo install cargo-deny --locked --version 0.20.2
      - name: Run Foundation gates
        run: cargo xtask test

  build:
    name: ${{ matrix.platform }}
    needs: foundation
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-26.04
            target: x86_64-unknown-linux-gnu
          - platform: linux-aarch64
            runner: ubuntu-26.04-arm
            target: aarch64-unknown-linux-gnu
          - platform: darwin-aarch64
            runner: macos-14
            target: aarch64-apple-darwin
          - platform: darwin-x86_64
            runner: macos-26
            target: x86_64-apple-darwin
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal
          rustup override set 1.97.0
          rustup target add ${{ matrix.target }}
      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          expected_version="${GITHUB_REF_NAME#v}"
          package_version="$(cargo pkgid --package velum-node | sed 's/.*#//')"
          test "$package_version" = "$expected_version" || {
            echo "release tag $GITHUB_REF_NAME does not match velum-node version $package_version" >&2
            exit 1
          }
      - name: Build velum
        env:
          VELUM_BUILD_REVISION: ${{ github.sha }}
        run: cargo build --locked --release --target ${{ matrix.target }} -p velum-node --bin velum
      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/velum dist/velum
          tar -C dist -czf "velum-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz" velum
          shasum -a 256 "velum-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz" > "velum-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz.sha256"
      - name: Upload packaged binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: velum-${{ matrix.platform }}
          path: |
            velum-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz
            velum-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create checksum manifest
        run: |
          cd artifacts
          cat *.sha256 > SHA256SUMS
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          release_args=()
          case "$GITHUB_REF_NAME" in
            *-*) release_args+=(--prerelease) ;;
          esac
          gh release create "$GITHUB_REF_NAME" artifacts/*.tar.gz artifacts/*.sha256 artifacts/SHA256SUMS "${release_args[@]}" --repo "$GITHUB_REPOSITORY" --title "Velum $GITHUB_REF_NAME" --notes "Release from $GITHUB_SHA. Pre-release versions do not establish a stable protocol or support commitment."
