version: 1
status: proposed

governance:
  governed_paths: ["crates/**", "apps/**"]
  excluded_paths: []

# Repository tooling such as xtask is deliberately outside the runtime module
# graph. Every package created under a governed path becomes blocking
# immediately; declared modules with no files remain inactive.

# Paths become enforceable as crates are created. Owners are responsibility
# labels until project maintainers are assigned.
modules:
  protocol:
    paths: ["crates/velum-protocol/**"]
    owner: protocol-maintainers
    may_depend_on: []
    public_api: ["crates/velum-protocol/src/lib.rs"]
    owns: [wire-types, frame-codec, version-negotiation]
    risk: critical
    unsafe_allowed: false

  crypto:
    paths: ["crates/velum-crypto/**"]
    owner: security-maintainers
    may_depend_on: [protocol]
    public_api: ["crates/velum-crypto/src/lib.rs"]
    owns: [session-authentication, key-derivation, replay-window]
    risk: critical
    unsafe_allowed: false

  carrier-api:
    paths: ["crates/velum-carrier-api/**"]
    owner: transport-maintainers
    may_depend_on: [protocol]
    public_api: ["crates/velum-carrier-api/src/lib.rs"]
    owns: [carrier-contract, carrier-events, carrier-capabilities]
    risk: critical
    unsafe_allowed: false

  carrier-quic:
    paths: ["crates/velum-carrier-quic/**"]
    owner: transport-maintainers
    may_depend_on: [carrier-api, protocol, telemetry]
    public_api: ["crates/velum-carrier-quic/src/lib.rs"]
    owns: [quic-transport, datagram-mtu, quic-health]
    risk: critical
    unsafe_allowed: false

  carrier-tls:
    paths: ["crates/velum-carrier-tls/**"]
    owner: transport-maintainers
    may_depend_on: [carrier-api, protocol, telemetry]
    public_api: ["crates/velum-carrier-tls/src/lib.rs"]
    owns: [tls-transport, tcp-stream-scheduling, tls-health]
    risk: critical
    unsafe_allowed: false

  session:
    paths: ["crates/velum-session/**"]
    owner: protocol-maintainers
    may_depend_on: [protocol, crypto, carrier-api, policy, telemetry]
    public_api: ["crates/velum-session/src/lib.rs"]
    owns: [session-state, flow-state, delivery-cursors, transition-epochs]
    risk: critical
    unsafe_allowed: false

  server:
    paths: ["crates/velum-server/**"]
    owner: server-maintainers
    may_depend_on: [session, telemetry]
    public_api: ["crates/velum-server/src/lib.rs"]
    owns: [principal-authentication, destination-authorization, principal-quotas]
    risk: critical
    unsafe_allowed: false

  policy:
    paths: ["crates/velum-policy/**"]
    owner: transport-maintainers
    may_depend_on: [carrier-api, telemetry]
    public_api: ["crates/velum-policy/src/lib.rs"]
    owns: [carrier-scoring, transition-policy, placement-policy]
    risk: standard
    unsafe_allowed: false

  forest:
    paths: ["crates/velum-forest/**"]
    owner: security-maintainers
    may_depend_on: [carrier-api, telemetry]
    public_api: ["crates/velum-forest/src/lib.rs"]
    owns: [cover-routing, traffic-profiles, pre-auth-behavior]
    risk: critical
    unsafe_allowed: false

  telemetry:
    paths: ["crates/velum-telemetry/**"]
    owner: operations-maintainers
    may_depend_on: []
    public_api: ["crates/velum-telemetry/src/lib.rs"]
    owns: [event-schema, metrics-schema, redaction]
    risk: standard
    unsafe_allowed: false

  adapters:
    paths: ["crates/velum-adapter-*/**"]
    owner: client-maintainers
    may_depend_on: [session, telemetry]
    public_api: []
    owns: [local-application-integration]
    risk: standard
    unsafe_allowed: reviewed-exception

  applications:
    paths: ["apps/**"]
    owner: release-maintainers
    may_depend_on:
      - session
      - policy
      - forest
      - carrier-quic
      - carrier-tls
      - adapters
      - server
      - telemetry
    public_api: []
    owns: [configuration, process-lifecycle, dependency-wiring]
    risk: standard
    unsafe_allowed: false

forbidden_dependencies:
  - from: protocol
    to: [session, policy, forest, carrier-quic, carrier-tls, applications]
  - from: crypto
    to: [session, policy, forest, carrier-quic, carrier-tls]
  - from: carrier-quic
    to: [carrier-tls, policy, session, forest]
  - from: carrier-tls
    to: [carrier-quic, policy, session, forest]
  - from: forest
    to: [crypto, protocol, session, policy]
  - from: policy
    to: [protocol, crypto, session, forest, carrier-quic, carrier-tls]
  - from: telemetry
    to: [protocol, crypto, carrier-api, session, policy, forest]
  - from: server
    to: [policy, forest, carrier-quic, carrier-tls]

change_classes:
  routine:
    max_modules: 2
    max_owners: 1
  cross_module:
    requires_design_note: true
  architectural:
    requires_adr: true

gates:
  dependency_cycles: 0
  forbidden_dependencies: 0
  unowned_modules: 0
  unowned_governed_files: 0

budgets:
  local_test_p95_seconds: 120
  required_ci_p95_seconds: 900
  flaky_test_rate: 0.01

compatibility:
  breaking_wire_change_requires_major_version: true
  shim_requires_owner: true
  shim_requires_removal_condition: true
