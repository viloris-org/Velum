version: 1
profile:
  id: personal
  name: Personal
  default-node: singapore
nodes:
  - id: node-sg
    alias: singapore
    relay-address: 203.0.113.10:4433
    server-name: relay.example
    credential-ref: secret://velum/personal/node-sg
    trust:
      mode: custom-ca
      ca-ref: secret://velum/personal/node-sg/ca
traffic:
  preferred-adapter: tun
  system-proxy:
    port: 0
    bypass: [localhost, 127.0.0.1, "::1"]
  tun:
    mtu: 1500
    ipv4: 172.19.0.1/30
    ipv6: fd00:19::1/126
    dns: [1.1.1.1, "2606:4700:4700::1111"]
routing:
  mode: rule
  rules:
    - match: { type: domain-suffix, value: example.com }
      action: { type: node, target: singapore }
    - match: { type: dst-port, value: 8000-8999 }
      action: { type: reject }
    - match: { type: ip-cidr, value: "2001:db8::/32" }
      action: { type: direct }
    - match: { type: match }
      action: { type: proxy }
