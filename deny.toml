[advisories]
yanked = "deny"

[licenses]
confidence-threshold = 0.8
unused-allowed-license = "allow"
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MIT",
  "0BSD",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
]

# Narrow exception for permissively licensed certificate data.
[[licenses.exceptions]]
allow = ["CDLA-Permissive-2.0"]
name = "webpki-root-certs"
version = "1.0.8"

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
